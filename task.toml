name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task requires parsing an Apache-style access log, counting all non-empty request records, identifying the number of distinct client IP addresses, and determining the most frequently requested path."
solution_explanation = "Read /app/access.log line by line, extract the client IP address and request path from each non-empty log entry, aggregate the request and IP counts, determine the most frequent path, and write the resulting JSON object to /app/report.json."
verification_explanation = "The verifier confirms that /app/report.json exists, is valid JSON, contains exactly the required keys with the required data types, and reports the correct total request count, unique IP count, and most frequently requested path derived from the supplied access log."

